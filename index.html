<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Tools Dashboard</title>

<style>
  :root { color-scheme: dark; }

  body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    margin: 40px auto;
    max-width: 1100px;
    padding: 0 20px;
  }

  h1 {
    margin-bottom: 30px;
  }

  h2 {
    margin-top: 40px;
    font-size: 18px;
    color: #bbb;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    margin-top: 15px;
  }

  .card {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 18px;
    text-decoration: none;
    color: #fff;
    transition: 0.15s ease;
  }

  .card:hover {
    background: #1a1a1a;
    border-color: #555;
  }

  .small {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
  }
</style>
</head>
<body>

</html>
